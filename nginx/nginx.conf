# nginx reverse proxy for SkinGuard
#
# This config handles:
#   1. HTTP → HTTPS redirect (port 80 → 443)
#   2. TLS termination (you must supply certs; see TLS block below)
#   3. Proxy-pass to the Next.js frontend (port 3000)
#   4. Proxy-pass /api/* to the FastAPI backend (port 8000)
#   5. Client-body size limit — blocks huge uploads before they hit Python
#   6. Security headers
#
# SETUP:
#   Replace YOUR_DOMAIN with your actual domain.
#   Place your TLS certificate at:
#     ./nginx/certs/fullchain.pem
#     ./nginx/certs/privkey.pem
#   (Use Certbot / Let's Encrypt or a self-signed cert for local testing.)

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenges to pass through.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (TLS termination) ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                           always;
    add_header X-Content-Type-Options    nosniff                                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=()"  always;

    # Max upload size (must match MAX_UPLOAD_BYTES in backend, default 8 MB).
    client_max_body_size 10M;

    # ── API proxy (/api/* → FastAPI backend) ──────────────────────────────────
    location /api/ {
        # Strip /api prefix before forwarding so backend routes match.
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeouts for OCR and LLM endpoints.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Frontend proxy (everything else → Next.js) ────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}

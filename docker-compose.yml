services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skinguard
      POSTGRES_PASSWORD: skinguard
      POSTGRES_DB: skinguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skinguard"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://skinguard:skinguard@db:5432/skinguard
      SKINGUARD_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      # Mount data so the gitignored CosIng CSV is available for seeding.
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:

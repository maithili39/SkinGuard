name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
          uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q --tb=short
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:test@localhost:5432/test
          SECRET_KEY: ci-test-secret-key-not-for-production
          # LLM disabled in CI — tests mock/skip the Gemini call
          GEMINI_API_KEY: ""
          # Skip the embedding model download in CI to keep build fast;
          # EmbeddingMatcher gracefully falls back to RapidFuzz.
          SKIP_LIFESPAN: "1"
          EMBED_MODEL: all-MiniLM-L6-v2

      - name: Check imports are clean
        run: python -c "from app.main import app; print('imports OK')"
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:test@localhost:5432/test
          SECRET_KEY: ci-test-secret
          GEMINI_API_KEY: ""
          SKIP_LIFESPAN: "1"

      - name: Verify evaluation script is importable
        run: python -c "import scripts.evaluate_matcher; print('evaluate_matcher OK')"
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:test@localhost:5432/test
          GEMINI_API_KEY: ""

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

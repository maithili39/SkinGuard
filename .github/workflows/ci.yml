name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Tests are self-contained (in-memory SQLite, mocked OCR). Skipping the
      # lifespan avoids building the matcher/embedding index against an empty DB.
      SKIP_LIFESPAN: "1"
      SKIP_RATELIMIT: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Alembic migrations apply cleanly
        env:
          DATABASE_URL: sqlite:///./ci_migrations.db
          SKIP_LIFESPAN: "1"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Check models match migrations (no un-generated changes)
        env:
          DATABASE_URL: sqlite:///./ci_check.db
          SKIP_LIFESPAN: "1"
        run: |
          alembic upgrade head
          alembic check

  accuracy:
    # Guards ingredient-matching quality against regressions. Runs the RapidFuzz
    # matcher over the committed curated gold set and fails if F1 drops below the
    # baseline (currently ~0.986). The embedding matcher is skipped (no torch in CI).
    runs-on: ubuntu-latest

    env:
      SKIP_LIFESPAN: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Evaluate matcher accuracy (regression gate)
        run: python -m scripts.evaluate_matcher --fuzzy-only --min-f1 0.95
